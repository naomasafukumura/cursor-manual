<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Window -->
  <rect width="700" height="350" rx="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="700" height="30" rx="10" fill="#2a2a3a"/>
  <rect y="20" width="700" height="10" fill="#2a2a3a"/>
  <circle cx="15" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="35" cy="15" r="6" fill="#febc2e"/>
  <circle cx="55" cy="15" r="6" fill="#28c840"/>

  <!-- Cursor Logo -->
  <text x="350" y="100" text-anchor="middle" fill="#fff" font-size="28" font-weight="bold">CURSOR</text>

  <!-- 3 Buttons -->
  <rect x="120" y="130" width="140" height="55" rx="8" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
  <text x="190" y="155" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Open project</text>
  <text x="190" y="172" text-anchor="middle" fill="#888" font-size="10">フォルダを開く</text>

  <rect x="280" y="130" width="140" height="55" rx="8" fill="#2a2a3a" stroke="#6c6cff" stroke-width="2"/>
  <text x="350" y="155" text-anchor="middle" fill="#6c6cff" font-size="13" font-weight="bold">Clone repo</text>
  <text x="350" y="172" text-anchor="middle" fill="#888" font-size="10">GitHubから取得</text>

  <rect x="440" y="130" width="140" height="55" rx="8" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
  <text x="510" y="155" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Connect via SSH</text>
  <text x="510" y="172" text-anchor="middle" fill="#666" font-size="10">使いません</text>

  <!-- Recent projects -->
  <text x="140" y="220" fill="#888" font-size="12">Recent projects</text>
  <rect x="130" y="230" width="440" height="30" rx="4" fill="#2a2a3a"/>
  <text x="145" y="250" fill="#fff" font-size="13">kpi-dashboard</text>
  <text x="430" y="250" fill="#666" font-size="11">.../Documents/kpi-dashboard</text>

  <rect x="130" y="265" width="440" height="30" rx="4" fill="#333345"/>
  <text x="145" y="285" fill="#fff" font-size="13">chunck-cards2</text>
  <text x="430" y="285" fill="#666" font-size="11">.../Documents/chunck-cards2</text>

  <!-- Annotation -->
  <text x="350" y="330" text-anchor="middle" fill="#febc2e" font-size="11">↑ 2回目以降はここからクリックするだけ！</text>
</svg>
