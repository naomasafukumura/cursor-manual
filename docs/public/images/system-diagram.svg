<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="380" fill="#fafaf9" rx="12"/>

  <!-- Vercel Box -->
  <rect x="30" y="130" width="160" height="80" rx="10" fill="#000" stroke="#000" stroke-width="2"/>
  <text x="110" y="165" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Vercel</text>
  <text x="110" y="190" text-anchor="middle" fill="#ccc" font-size="13">サイト公開</text>

  <!-- Arrow: GitHub → Vercel -->
  <line x1="230" y1="170" x2="195" y2="170" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="212" y="160" text-anchor="middle" fill="#a8a29e" font-size="11">自動</text>

  <!-- GitHub Box -->
  <rect x="240" y="130" width="180" height="80" rx="10" fill="#24292e" stroke="#24292e" stroke-width="2"/>
  <text x="330" y="165" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">GitHub</text>
  <text x="330" y="190" text-anchor="middle" fill="#ccc" font-size="13">共有フォルダ</text>

  <!-- Arrows: Cursor1 ↔ GitHub -->
  <line x1="510" y1="100" x2="425" y2="150" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="145" x2="515" y2="95" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="105" text-anchor="middle" fill="#a8a29e" font-size="11">同期</text>

  <!-- Arrows: Cursor2 ↔ GitHub -->
  <line x1="510" y1="280" x2="425" y2="210" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="215" x2="515" y2="285" stroke="#a8a29e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="265" text-anchor="middle" fill="#a8a29e" font-size="11">同期</text>

  <!-- Cursor Box 1 -->
  <rect x="520" y="40" width="240" height="100" rx="10" fill="#ea580c"/>
  <text x="640" y="75" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">Cursor + Claude Code</text>
  <text x="640" y="100" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">メンバー A のパソコン</text>
  <text x="640" y="120" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">日本語で話しかけるだけ</text>

  <!-- Cursor Box 2 -->
  <rect x="520" y="240" width="240" height="100" rx="10" fill="#ea580c"/>
  <text x="640" y="275" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">Cursor + Claude Code</text>
  <text x="640" y="300" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="13">メンバー B のパソコン</text>
  <text x="640" y="320" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">日本語で話しかけるだけ</text>

  <!-- More members -->
  <text x="640" y="365" text-anchor="middle" fill="#a8a29e" font-size="13">. . . 他のメンバーも同じ</text>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">全体の仕組み</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a8a29e"/>
    </marker>
  </defs>
</svg>
